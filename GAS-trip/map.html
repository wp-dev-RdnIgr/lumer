<script>
// ========== MAP MANAGER ==========
var MapManager = {
  map: null,
  clusterGroup: null,
  markersById: {},
  routeLayers: [],
  stopMarkers: [],
  homeMarker: null,
  routeCache: {},

  init: function() {
    this.map = L.map('map', {
      center: [32.75, -16.95],
      zoom: 10,
      zoomControl: true,
      maxBounds: [[32.2, -17.5], [33.2, -16.2]],
      minZoom: 9
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a>',
      maxZoom: 18
    }).addTo(this.map);

    this.clusterGroup = L.markerClusterGroup({
      maxClusterRadius: 40,
      spiderfyOnMaxZoom: true,
      showCoverageOnHover: false,
      iconCreateFunction: function(cluster) {
        var count = cluster.getChildCount();
        var size = 'small';
        if (count > 10) size = 'medium';
        if (count > 25) size = 'large';
        return L.divIcon({
          html: '<div class="cluster-icon cluster-' + size + '">' + count + '</div>',
          className: '',
          iconSize: [36, 36]
        });
      }
    });
    this.map.addLayer(this.clusterGroup);

    this.homeMarker = L.marker([HOME_BASE.lat, HOME_BASE.lng], {
      icon: L.divIcon({
        html: '<div class="home-marker">🏠</div>',
        className: '',
        iconSize: [36, 36],
        iconAnchor: [18, 18]
      }),
      zIndexOffset: 1000
    }).addTo(this.map);
    this.homeMarker.bindPopup('<div class="popup-content"><div class="popup-title">🏠 ' + HOME_BASE.name + '</div><div class="popup-desc">Ваша база на Мадейре</div></div>');
  },

  createMarkers: function() {
    this.clusterGroup.clearLayers();
    this.markersById = {};

    for (var a = 0; a < ATTRACTIONS.length; a++) {
      var attr = ATTRACTIONS[a];
      var cat = getCategoryById(attr.category_id);
      if (!cat) continue;

      var marker = L.marker([attr.lat, attr.lng], {
        icon: L.divIcon({
          html: '<div class="custom-marker" style="background:' + cat.color + '">' + cat.emoji + '</div>',
          className: '',
          iconSize: [32, 32],
          iconAnchor: [16, 16],
          popupAnchor: [0, -16]
        })
      });

      var difficultyRu = { easy: 'легко', moderate: 'средне', hard: 'сложно' };
      var diffText = attr.difficulty ? ' | ' + (difficultyRu[attr.difficulty] || attr.difficulty) : '';

      var galleryHtml = Gallery.popupGalleryHtml(attr.id);
      var tipsHtml = attr.tips ? '<div class="popup-tips">💡 ' + attr.tips + '</div>' : '';

      var popupHtml = '<div class="popup-content">' +
        galleryHtml +
        '<div class="popup-title">' + cat.emoji + ' ' + attr.name + '</div>' +
        '<div class="popup-category" style="color:' + cat.color + '">' + cat.nameRu + '</div>' +
        '<div class="popup-desc">' + (attr.description || '') + '</div>' +
        tipsHtml +
        '<div class="popup-meta">⏱ ' + formatDuration(attr.duration) + diffText + '</div>' +
        '<button class="popup-add-btn" onclick="App.showAddModal(\'' + attr.id + '\')">+ Добавить в маршрут</button>' +
        '</div>';

      marker.bindPopup(popupHtml, { maxWidth: 300, minWidth: 200 });
      marker.attractionId = attr.id;
      this.markersById[attr.id] = marker;
      this.clusterGroup.addLayer(marker);
    }
  },

  filterByCategories: function(activeCategories) {
    this.clusterGroup.clearLayers();
    for (var i = 0; i < ATTRACTIONS.length; i++) {
      var attr = ATTRACTIONS[i];
      if (activeCategories.has(attr.category_id)) {
        var marker = this.markersById[attr.id];
        if (marker) this.clusterGroup.addLayer(marker);
      }
    }
  },

  highlightAttraction: function(attractionId) {
    var marker = this.markersById[attractionId];
    if (!marker) return;
    this.clusterGroup.zoomToShowLayer(marker, function() {
      marker.openPopup();
    });
  },

  clearRoutes: function() {
    for (var i = 0; i < this.routeLayers.length; i++) {
      this.map.removeLayer(this.routeLayers[i]);
    }
    this.routeLayers = [];
    for (var j = 0; j < this.stopMarkers.length; j++) {
      this.map.removeLayer(this.stopMarkers[j]);
    }
    this.stopMarkers = [];
  },

  showDayRoute: function(dayIndex, attractionIds, color) {
    var self = this;
    if (!attractionIds || attractionIds.length === 0) return Promise.resolve(null);

    var waypoints = [[HOME_BASE.lng, HOME_BASE.lat]];
    for (var i = 0; i < attractionIds.length; i++) {
      var a = getAttractionById(attractionIds[i]);
      if (a) waypoints.push([a.lng, a.lat]);
    }
    waypoints.push([HOME_BASE.lng, HOME_BASE.lat]);

    if (waypoints.length < 3) return Promise.resolve(null);

    var cacheKey = waypoints.map(function(w) { return w[0].toFixed(4) + ',' + w[1].toFixed(4); }).join(';');
    var routeData = self.routeCache[cacheKey];

    if (routeData) {
      return Promise.resolve(self._drawRoute(routeData, attractionIds, color));
    }

    var coords = waypoints.map(function(w) { return w[0] + ',' + w[1]; }).join(';');
    var url = 'https://router.project-osrm.org/route/v1/driving/' + coords + '?overview=full&geometries=geojson';

    return fetch(url)
      .then(function(resp) { return resp.json(); })
      .then(function(data) {
        if (data.code === 'Ok' && data.routes && data.routes[0]) {
          routeData = {
            geometry: data.routes[0].geometry,
            duration: data.routes[0].duration,
            distance: data.routes[0].distance
          };
          self.routeCache[cacheKey] = routeData;
          return self._drawRoute(routeData, attractionIds, color);
        }
        return null;
      })
      .catch(function(err) {
        console.error('OSRM routing error:', err);
        var fallbackCoords = waypoints.map(function(w) { return [w[1], w[0]]; });
        var line = L.polyline(fallbackCoords, {
          color: color, weight: 3, opacity: 0.7, dashArray: '8,8'
        }).addTo(self.map);
        self.routeLayers.push(line);
        return null;
      });
  },

  _drawRoute: function(routeData, attractionIds, color) {
    var geoLayer = L.geoJSON(routeData.geometry, {
      style: { color: color, weight: 4, opacity: 0.8 }
    }).addTo(this.map);
    this.routeLayers.push(geoLayer);

    for (var i = 0; i < attractionIds.length; i++) {
      var attr = getAttractionById(attractionIds[i]);
      if (!attr) continue;
      var stopMarker = L.marker([attr.lat, attr.lng], {
        icon: L.divIcon({
          html: '<div class="route-stop-marker" style="background:' + color + '">' + (i + 1) + '</div>',
          className: '',
          iconSize: [26, 26],
          iconAnchor: [13, 13]
        }),
        zIndexOffset: 500
      }).addTo(this.map);
      this.stopMarkers.push(stopMarker);
    }

    return { duration: routeData.duration, distance: routeData.distance };
  },

  showAllDayRoutes: function(days) {
    this.clearRoutes();
    var self = this;
    var results = [];
    var chain = Promise.resolve();

    for (var i = 0; i < days.length; i++) {
      (function(idx) {
        var color = DAY_COLORS[idx % DAY_COLORS.length];
        chain = chain.then(function() {
          return self.showDayRoute(idx, days[idx].attractions, color);
        }).then(function(result) {
          results[idx] = result;
          if (idx < days.length - 1) {
            return new Promise(function(r) { setTimeout(r, 200); });
          }
        });
      })(i);
    }

    return chain.then(function() {
      if (self.routeLayers.length > 0) {
        var group = L.featureGroup(self.routeLayers);
        self.map.fitBounds(group.getBounds().pad(0.1));
      }
      return results;
    });
  },

  showSingleDayRoute: function(dayIndex, days) {
    this.clearRoutes();
    var self = this;
    if (dayIndex < 0 || dayIndex >= days.length) return Promise.resolve(null);

    var color = DAY_COLORS[dayIndex % DAY_COLORS.length];
    return this.showDayRoute(dayIndex, days[dayIndex].attractions, color).then(function(result) {
      if (self.routeLayers.length > 0) {
        var group = L.featureGroup(self.routeLayers);
        self.map.fitBounds(group.getBounds().pad(0.1));
      }
      return result;
    });
  },

  resetView: function() {
    this.clearRoutes();
    this.map.setView([32.75, -16.95], 10);
  }
};
</script>
