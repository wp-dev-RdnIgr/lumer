<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <?!= include('styles') ?>
</head>
<body>

  <!-- TOP BAR -->
  <header id="topbar">
    <div class="topbar-left">
      <h1>🗺️ Мадейра — Планировщик</h1>
    </div>
    <div class="topbar-center" id="day-selector-bar">
      <!-- Кнопки дней рендерятся в app.js -->
    </div>
    <div class="topbar-right">
      <button id="btn-export" class="btn-icon" title="Экспорт маршрута">📋 Экспорт</button>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <div id="app-container">

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div id="sidebar-tabs">
        <button class="tab-btn active" data-tab="tab-attractions">Места</button>
        <button class="tab-btn" data-tab="tab-trip">Мой маршрут</button>
        <button class="tab-btn" data-tab="tab-presets">Готовые</button>
      </div>

      <!-- TAB 1: ДОСТОПРИМЕЧАТЕЛЬНОСТИ -->
      <div id="tab-attractions" class="tab-panel active">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="🔍 Поиск мест..." />
        </div>
        <div class="filters-section">
          <div class="filters-header">
            <span>Категории</span>
            <div class="filters-actions">
              <button id="btn-select-all" class="btn-link">Все</button>
              <button id="btn-deselect-all" class="btn-link">Сброс</button>
            </div>
          </div>
          <div id="category-filters" class="category-grid">
            <!-- Чекбоксы рендерятся в app.js -->
          </div>
        </div>
        <div id="attractions-list" class="scrollable-list">
          <!-- Карточки мест рендерятся в app.js -->
        </div>
      </div>

      <!-- TAB 2: МОЙ МАРШРУТ -->
      <div id="tab-trip" class="tab-panel">
        <div class="trip-header">
          <button id="btn-add-day" class="btn-small">+ Добавить день</button>
          <span id="trip-summary" class="trip-summary"></span>
        </div>
        <div id="days-container" class="scrollable-list">
          <!-- Панели дней рендерятся в planner.js -->
        </div>
      </div>

      <!-- TAB 3: ГОТОВЫЕ МАРШРУТЫ -->
      <div id="tab-presets" class="tab-panel">
        <p class="presets-intro">Загрузите готовый маршрут на 5 дней из Машику. Можно редактировать после загрузки.</p>
        <div id="presets-list">
          <!-- Карточки пресетов рендерятся в app.js -->
        </div>
      </div>
    </aside>

    <!-- MAP -->
    <div id="map-container">
      <div id="map"></div>
      <div id="map-legend" class="map-legend">
        <!-- Легенда рендерится в app.js -->
      </div>
    </div>
  </div>

  <!-- МОДАЛКА: ДОБАВИТЬ В ДЕНЬ -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Добавить в день</h3>
        <button id="modal-close" class="btn-close">&times;</button>
      </div>
      <div id="modal-body" class="modal-body">
        <!-- Кнопки дней рендерятся динамически -->
      </div>
    </div>
  </div>

  <!-- LOADING -->
  <div id="loading-overlay" class="modal-overlay">
    <div class="modal" style="text-align:center;">
      <h3>⏳ Загрузка данных...</h3>
      <p style="color:#636e72;font-size:13px;margin-top:8px;">Получаем достопримечательности Мадейры</p>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <?!= include('data') ?>
  <?!= include('map') ?>
  <?!= include('planner') ?>
  <?!= include('app') ?>

</body>
</html>
